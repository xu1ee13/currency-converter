<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>即時匯率轉換器</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; background-color: #f4f4f9; }
        .converter-box { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        select, input { width: 100%; margin: 10px 0; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="converter-box">
    <h3>匯率轉換 (預設 TWD)</h3>
    <input type="number" id="amount" value="1" placeholder="金額">
    <label>從：</label>
    <select id="fromCurrency"><option value="TWD">TWD - 臺幣</option><option value="KRW">KRW - 韓元</option><option value="USD">USD - 美金</option><option value="JPY">JPY - 日圓</option></select>
    <label>到：</label>
    <select id="toCurrency"><option value="KRW">KRW - 韓元</option><option value="TWD">TWD - 台幣</option><option value="USD">USD - 美金</option><option value="JPY">JPY - 日圓</option></select>
    <button onclick="convert()">轉換</button>
    <p id="result">結果：--</p>
</div>

<script>
async function convert() {
    const amount = document.getElementById('amount').value;
    const from = document.getElementById('fromCurrency').value;
    const to = document.getElementById('toCurrency').value;
    
    // 使用 Frankfurter 公開 API (無需 API Key)
    const url = `https://api.frankfurter.app/latest?amount=${amount}&from=${from}&to=${to}`;
    
    try {
        const response = await fetch(url);
        const data = await response.json();
        const rate = data.rates[to];
        document.getElementById('result').innerText = `結果：${amount} ${from} = ${rate} ${to}`;
    } catch (e) {
        document.getElementById('result').innerText = "發生錯誤，請稍後再試";
    }
}
</script>
</body>
</html>
