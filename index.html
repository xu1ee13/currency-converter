<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>即時匯率轉換器</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; background-color: #f4f4f9; }
        .converter-box { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 350px; }
        input, select { width: 100%; margin: 8px 0; padding: 12px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 8px; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .swap-btn { background: #6c757d; margin: 5px 0; }
        #result { margin-top: 20px; padding: 15px; background: #e9ecef; border-radius: 8px; font-size: 1.1em; }
    </style>
</head>
<body>

<div class="converter-box">
    <h3>匯率轉換器</h3>
    <input type="text" id="amount" inputmode="decimal" placeholder="請輸入金額">
    
    <select id="fromCurrency">
        <option value="TWD" selected>台幣 (TWD)</option>
        <option value="KRW">韓幣 (KRW)</option>
        <option value="JPY">日圓 (JPY)</option>
        <option value="CNY">人民幣 (CNY)</option>
        <option value="HKD">港幣 (HKD)</option>
        <option value="THB">泰銖 (THB)</option>
        <option value="USD">美金 (USD)</option>
        <option value="GBP">英鎊 (GBP)</option>
        <option value="AUD">澳幣 (AUD)</option>
        <option value="SGD">新加坡幣 (SGD)</option>
        <option value="PHP">菲律賓披索 (PHP)</option>
    </select>
    
    <button class="swap-btn" onclick="swapCurrency()">↕️ 交換幣別</button>
    
    <select id="toCurrency">
        <option value="KRW" selected>韓幣 (KRW)</option>
        <option value="TWD">台幣 (TWD)</option>
        <option value="JPY">日圓 (JPY)</option>
        <option value="CNY">人民幣 (CNY)</option>
        <option value="HKD">港幣 (HKD)</option>
        <option value="THB">泰銖 (THB)</option>
        <option value="USD">美金 (USD)</option>
        <option value="GBP">英鎊 (GBP)</option>
        <option value="AUD">澳幣 (AUD)</option>
        <option value="SGD">新加坡幣 (SGD)</option>
        <option value="PHP">菲律賓披索 (PHP)</option>
    </select>
    
    <button onclick="convert()">開始轉換</button>
    <div id="result">結果：請輸入金額後點擊轉換</div>
</div>

<script>
function swapCurrency() {
    const from = document.getElementById('fromCurrency');
    const to = document.getElementById('toCurrency');
    [from.value, to.value] = [to.value, from.value];
}

async function convert() {
    const amount = parseFloat(document.getElementById('amount').value);
    const from = document.getElementById('fromCurrency').value;
    const to = document.getElementById('toCurrency').value;
    const display = document.getElementById('result');
    
    if (isNaN(amount)) { display.innerText = "請輸入有效的數字"; return; }
    display.innerText = "查詢中...";
    
    try {
        const response = await fetch(`https://open.er-api.com/v6/latest/${from}`);
        const data = await response.json();
        const rate = data.rates[to];
        const final = (amount * rate).toFixed(2);
        display.innerHTML = `<strong>${amount} ${from} = ${final} ${to}</strong><br><small>即時匯率: 1 ${from} = ${rate.toFixed(4)} ${to}</small>`;
    } catch (e) {
        display.innerText = "網路連線錯誤，請稍後再試";
    }
}
</script>
</body>
</html>
